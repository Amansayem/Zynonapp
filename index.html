<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
    <style>
        body { background-color: #1a202c; color: white; }
        .chat-container { max-width: 600px; margin: auto; padding: 1rem; border: 1px solid #4A5568; border-radius: 0.5rem; background: #2d3748; }
        .chat-history { overflow-y: auto; max-height: 400px; }
        .message { margin: 0.5rem 0; padding: 0.5rem; border-radius: 0.5rem; }
        .user { background-color: #2b6cb0; text-align: right; }
        .bot { background-color: #d53f8c; }
        .dark-mode { background-color: #1a202c; }
    </style>
</head>
<body>
    <div id="app" class="chat-container dark-mode">
        <h1 class="text-2xl mb-4">Advanced AI Chatbot</h1>
        <div class="chat-history" id="chat-history"></div>
        <input type="text" id="user-input" class="mt-2 p-2 w-full" placeholder="Type your message..." />
        <button id="send-button" class="mt-2 p-2 bg-blue-500 rounded w-full">Send</button>
    </div>
    <script>
        const chatHistoryElement = document.getElementById('chat-history');
        const userInputElement = document.getElementById('user-input');
        const sendButtonElement = document.getElementById('send-button');

        let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];

        function renderChatHistory() {
            chatHistoryElement.innerHTML = '';
            chatHistory.forEach((message) => {
                const messageElement = document.createElement('div');
                messageElement.className = `message ${message.sender}`;
                messageElement.textContent = message.text;
                chatHistoryElement.appendChild(messageElement);
            });
            chatHistoryElement.scrollTop = chatHistoryElement.scrollHeight;
        }

        function sendMessage(text, sender) {
            chatHistory.push({ text, sender });
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
            renderChatHistory();
        }

        sendButtonElement.addEventListener('click', () => {
            const userInput = userInputElement.value;
            if (userInput) {
                sendMessage(userInput, 'user');
                userInputElement.value = '';
                // Placeholder for bot response
                setTimeout(() => {
                    const botResponse = 'This is a placeholder for bot response.'; // Here you would integrate the AI model
                    sendMessage(botResponse, 'bot');
                }, 1000);
            }
        });

        renderChatHistory();
    </script>
</body>
</html>
