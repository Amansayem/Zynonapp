<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zynon – AI Chat</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Prism.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.css"/>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-white border-r hidden md:flex flex-col">
    <div class="p-4 border-b flex justify-between items-center">
      <h2 class="font-bold">Chats</h2>
      <button id="newChatBtn" class="text-blue-500">+ New</button>
    </div>
    <ul id="chatList" class="flex-1 overflow-y-auto"></ul>
    <div class="p-4 border-t">
      <button id="settingsBtn" class="w-full bg-gray-200 rounded p-2">⚙ Settings</button>
      <button id="darkModeBtn" class="w-full bg-gray-200 rounded p-2 mt-2">🌙 Toggle</button>
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main class="flex-1 flex flex-col">
    <header class="p-4 border-b flex justify-between items-center bg-white">
      <button id="hamburger" class="md:hidden">☰</button>
      <h1 id="chatTitle" class="font-bold">Zynon</h1>
    </header>

    <div id="messages" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-4"></div>

    <!-- Input Bar -->
    <div class="p-4 border-t bg-white sticky bottom-0">
      <form id="chatForm" class="flex space-x-2 items-center">
        <textarea id="chatInput" placeholder="Type a message..."
          class="flex-1 border rounded p-2 resize-none" rows="1" required></textarea>
        <button id="micBtn" type="button" class="bg-gray-300 px-3 rounded">🎤</button>
        <button class="bg-blue-500 text-white px-4 rounded">Send</button>
      </form>
    </div>
  </main>

  <!-- Loader -->
  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white">
    Loading App...
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded w-80">
      <h2 class="font-bold mb-4">Settings</h2>
      <label class="block mb-2">API Key
        <input id="apiKeyInput" type="password" class="w-full border rounded p-2">
      </label>
      <label class="block mb-2">Model
        <input id="modelInput" type="text" class="w-full border rounded p-2" value="deepseek/deepseek-r1:free">
      </label>
      <label class="block mb-2">Temperature
        <input id="tempInput" type="number" step="0.1" min="0" max="2" class="w-full border rounded p-2" value="1.0">
      </label>
      <button id="saveSettings" class="bg-blue-500 text-white w-full p-2 rounded mt-2">Save</button>
      <button id="closeSettings" class="bg-gray-300 w-full p-2 rounded mt-2">Close</button>
    </div>
  </div>

  <!-- Script at END -->
  <script>
    // Hide loader after init
    document.getElementById("loading").style.display = "none";

    // LocalStorage helpers
    const storage = {
      get: (key, def) => JSON.parse(localStorage.getItem(key)) || def,
      set: (key, val) => localStorage.setItem(key, JSON.stringify(val))
    };

    // Dark mode
    const darkBtn = document.getElementById("darkModeBtn");
    function applyDarkMode() {
      const dark = storage.get("darkMode", false);
      document.body.classList.toggle("bg-gray-900", dark);
      document.body.classList.toggle("text-white", dark);
    }
    darkBtn.onclick = () => {
      storage.set("darkMode", !storage.get("darkMode", false));
      applyDarkMode();
    };
    applyDarkMode();

    // Sidebar toggle
    const sidebar = document.getElementById("sidebar");
    document.getElementById("hamburger").onclick = () => {
      sidebar.classList.toggle("hidden");
    };

    // Settings modal
    const modal = document.getElementById("settingsModal");
    document.getElementById("settingsBtn").onclick = () => modal.classList.remove("hidden");
    document.getElementById("closeSettings").onclick = () => modal.classList.add("hidden");
    document.getElementById("saveSettings").onclick = () => {
      storage.set("apiKey", document.getElementById("apiKeyInput").value);
      storage.set("model", document.getElementById("modelInput").value);
      storage.set("temperature", parseFloat(document.getElementById("tempInput").value));
      modal.classList.add("hidden");
    };

    // Voice input
    const micBtn = document.getElementById("micBtn");
    micBtn.onclick = () => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Speech recognition not supported in this browser.");
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.start();
      recognition.onresult = (event) => {
        document.getElementById("chatInput").value = event.results[0][0].transcript;
      };
    };

    // Chat handling
    const messages = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");

    chatForm.onsubmit = async (e) => {
      e.preventDefault();
      const text = document.getElementById("chatInput").value.trim();
      if (!text) return;
      addMessage(text, "user");
      document.getElementById("chatInput").value = "";

      const apiKey = storage.get("apiKey", "");
      const model = storage.get("model", "deepseek/deepseek-r1:free");
      const temperature = storage.get("temperature", 1.0);
      if (!apiKey) {
        addMessage("⚠ Please set API key in settings.", "ai");
        return;
      }

      try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + apiKey,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model,
            temperature,
            stream: true,
            messages: [
              { role: "system", content: "You are Zynon, an advanced AI assistant. Show reasoning when possible." },
              { role: "user", content: text }
            ]
          })
        });

        // Streaming response
        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let fullText = "";
        const aiDiv = addMessage("", "ai", true, "Zynon is thinking...");

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop();
          for (const part of parts) {
            if (part.startsWith("data:")) {
              const data = part.slice(5).trim();
              if (data === "[DONE]") continue;
              try {
                const json = JSON.parse(data);
                const token = json.choices?.[0]?.delta?.content;
                if (token) {
                  fullText += token;
                  aiDiv.innerHTML = marked.parse(fullText);
                  Prism.highlightAllUnder(aiDiv);
                  messages.scrollTop = messages.scrollHeight;
                }
              } catch {}
            }
          }
        }
      } catch (err) {
        addMessage("⚠ Error
